<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社交回声 · 中保真原型</title>
  <style>
    /* ========== 全局基础样式 ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f5f5;
      color: #2c2c2c;
      font: 14px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    button {
      font: inherit; cursor: pointer;
      background: #fff; border: 1px solid #c8c8c8; color: #333;
      padding: 6px 14px; border-radius: 3px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    input, textarea, select {
      font: inherit; width: 100%;
      background: #fff; border: 1px solid #c8c8c8; color: #333;
      padding: 6px 10px; border-radius: 3px;
    }
    .btn-primary { background: #2c2c2c; color: #fff; border-color: #2c2c2c; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .col { display: flex; flex-direction: column; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .muted { color: #888; font-size: 12px; }
    .title { font-size: 18px; font-weight: 600; }
    .section-title {
      color: #888; font-size: 11px; letter-spacing: 2px;
      text-align: center; margin: 16px 0 10px;
    }
    .placeholder {
      border: 1px dashed #c8c8c8; border-radius: 3px;
      padding: 14px; text-align: center; color: #888;
      background: #fafafa;
    }

    /* ========== 应用框架 ========== */
    .app-shell { max-width: 960px; margin: 0 auto; padding: 16px; }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; margin-bottom: 16px;
      background: #fff; border: 1px solid #ddd; border-radius: 4px;
    }
    .nav .brand { font-size: 13px; color: #444; letter-spacing: 1px; }
    .nav .links { display: flex; gap: 6px; flex-wrap: wrap; }
    .nav a {
      padding: 4px 10px; font-size: 13px; color: #666;
      border: 1px solid transparent; border-radius: 3px;
    }
    .nav a.active { background: #2c2c2c; color: #fff; border-color: #2c2c2c; }
    .badge {
      display: inline-block; min-width: 16px; height: 16px;
      padding: 0 4px; margin-left: 4px; font-size: 10px; line-height: 16px;
      text-align: center; color: #fff; background: #a04a3f;
      border-radius: 8px; vertical-align: 1px;
    }

    /* ========== 卡片 / Tag / 头像 / 进度条 ========== */
    .box { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 14px; }
    .box-dashed { border-style: dashed; background: #fafafa; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #eee; border: 1px solid #ccc;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .avatar.frozen { filter: grayscale(1) brightness(0.85); position: relative; }
    .avatar.frozen::after {
      content: "❄"; position: absolute; right: -2px; bottom: -2px;
      font-size: 10px; background: #fff; border: 1px solid #ccc;
      width: 14px; height: 14px; border-radius: 50%; line-height: 12px;
    }
    .tag {
      display: inline-block; padding: 1px 6px; font-size: 11px;
      border: 1px solid #c8c8c8; border-radius: 2px; margin-right: 4px;
    }
    .tag-warm   { background: #f6ead8; border-color: #c79a6a; color: #6f4d24; }
    .tag-cool   { background: #ededed; border-color: #999;    color: #555; }
    .tag-frozen { background: #e0e6ec; border-color: #6a8caa; color: #2f4d6e; }
    .bar { width: 80px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; display: inline-block; }
    .bar-fill { height: 100%; background: #888; transition: width 0.4s; }
    .bar-fill.warm   { background: #c79a6a; }
    .bar-fill.cool   { background: #999; }
    .bar-fill.frozen { background: #6a8caa; }

    /* ========== 三语气文案卡片 ========== */
    .draft-card { border: 1px solid #ddd; border-radius: 4px; padding: 12px; margin-bottom: 10px; }
    .draft-card.respect { background: #f8f4ee; border-color: #c79a6a; }
    .draft-card.neutral { background: #f4f4f4; border-color: #aaa; }
    .draft-card.casual  { background: #eef2f8; border-color: #6a8caa; }
    .draft-tone { font-size: 11px; letter-spacing: 1px; color: #888; }
    .draft-text { margin: 6px 0; line-height: 1.7; }

    /* ========== 开关 ========== */
    .switch { position: relative; width: 40px; height: 22px; display: inline-block; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #ddd; border: 1px solid #bbb;
      border-radius: 22px; cursor: pointer; transition: 0.2s;
    }
    .slider::before {
      content: ""; position: absolute; left: 2px; top: 2px;
      width: 16px; height: 16px; background: #fff; border: 1px solid #999;
      border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: #6b6b6b; }
    input:checked + .slider::before { transform: translateX(18px); }
    input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }

    /* ========== Toast ========== */
    .toast {
      position: fixed; left: 50%; bottom: 40px;
      transform: translateX(-50%);
      background: #2c2c2c; color: #fff;
      padding: 8px 18px; border-radius: 4px; font-size: 13px;
      z-index: 999; opacity: 0.95;
    }

    /* ========== 朋友圈 ========== */
    .moment { padding: 14px; border-bottom: 1px dashed #ddd; }
    .moment-user { font-weight: 600; color: #4a6a8a; margin-bottom: 4px; }
    .moment-text { line-height: 1.7; margin-bottom: 8px; }

    /* ========== 移动端基本响应 ========== */
    @media (max-width: 600px) {
      .nav { flex-direction: column; align-items: stretch; gap: 8px; }
      .nav .links { justify-content: center; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Vue 3 运行库 -->
  <script>__VUE_RUNTIME__</script>
  <!-- Vue Router 运行库 -->
  <script>__VUE_ROUTER_RUNTIME__</script>

  <!-- ========================================================== -->
  <!-- 业务代码：以下全部为人类可读源码，可自由修改                 -->
  <!-- ========================================================== -->
  <script>
  (function () {
    const { createApp, reactive, computed, watch, ref, onMounted } = Vue;
    const { createRouter, createWebHashHistory, useRouter, useRoute } = VueRouter;

    /* ========== Store · 数据持久化到 localStorage ========== */
    const STORAGE_KEY = "social-echo-midfi-v1";
    const SEED = [
      { name: "陈学长", avatar: "🧑‍🎓", level: "senior", memory: "毕设导师组里带过我，研究脑机接口", tags: "科研,前辈", daysAgo: 120, moment: "新论文 accepted，感谢实验室的小伙伴！" },
      { name: "林晓棠", avatar: "🌸", level: "bestie", memory: "一起熬夜写过 MySQL 大作业的队友", tags: "旧友,大学", daysAgo: 95, moment: "今天的咖啡有点苦，像我赶 ddl 的人生。" },
      { name: "Kevin",  avatar: "🎮", level: "bestie", memory: "周末固定开黑搭子，国服韦恩",       tags: "游戏,死党", daysAgo: 18,  moment: "新赛季出了，谁跟我五黑！" },
      { name: "周老师", avatar: "👔", level: "senior", memory: "实习时的 mentor，分享过很多产品方法论", tags: "职场,前辈", daysAgo: 200, moment: "推荐一篇关于大模型 Agent 综述的好文。" },
      { name: "小鱼",   avatar: "🐟", level: "casual", memory: "去年行业大会上聊过一次脑机接口",     tags: "泛交,行业", daysAgo: 150, moment: "初雪了，城市突然变得很安静。" },
      { name: "阿哲",   avatar: "🎸", level: "casual", memory: "民谣音乐节上认识，互留微信后再没说过话", tags: "泛交",   daysAgo: 300, moment: "新歌 demo 录完了，emo 中。" },
      { name: "Tina",   avatar: "💼", level: "senior", memory: "校招面试官，后来加了好友",            tags: "职场,前辈", daysAgo: 75,  moment: "招人ing，欢迎推荐做产品的同学。" },
      { name: "大白",   avatar: "🐻", level: "bestie", memory: "高中同桌，互相抄过物理作业",          tags: "旧友,死党", daysAgo: 40,  moment: "回了趟老家，老妈做的红烧肉永远天花板。" },
    ];
    const DEFAULT_SETTINGS = {
      onboarded: false, notifyEnabled: true, ignoreLimit: 3,
      thresholds: {
        senior: { warm: 60, frozen: 120 },
        bestie: { warm: 30, frozen: 60 },
        casual: { warm: 90, frozen: 180 },
      },
    };
    const makeId = () => Math.random().toString(36).slice(2, 10);
    function buildSeed() {
      const now = Date.now();
      return SEED.map(s => ({
        id: makeId(), name: s.name, avatar: s.avatar, level: s.level,
        memory: s.memory, tags: s.tags,
        lastContact: new Date(now - s.daysAgo * 86400000).toISOString(),
        ignoreCount: 0, archived: false,
        latestMoment: s.moment,
        momentTime: new Date(now - Math.random() * 7 * 86400000).toISOString(),
        history: [],
      }));
    }
    function loadStore() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          data.settings = Object.assign({}, DEFAULT_SETTINGS, data.settings || {});
          return data;
        }
      } catch(e) {}
      return { contacts: buildSeed(), settings: Object.assign({}, DEFAULT_SETTINGS) };
    }
    const store = reactive(loadStore());
    watch(() => store, v => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); } catch(e) {} }, { deep: true });

    function findContact(id) { return store.contacts.find(c => c.id === id); }
    function addContact(form) {
      const c = {
        id: makeId(), name: form.name, avatar: form.avatar || "👤",
        level: form.level || "casual", memory: form.memory || "", tags: form.tags || "",
        lastContact: new Date(Date.now() - (Number(form.daysAgo) || 0) * 86400000).toISOString(),
        ignoreCount: 0, archived: false, latestMoment: "", momentTime: new Date().toISOString(),
        history: [],
      };
      store.contacts.unshift(c);
      return c;
    }
    function markUsed(id, drafts, trigger, tone) {
      const c = findContact(id); if (!c) return;
      c.history.unshift({ trigger, drafts, tone, used: true, ignored: false, ts: new Date().toISOString() });
      c.lastContact = new Date().toISOString(); c.ignoreCount = 0; c.archived = false;
    }
    function markIgnored(id, drafts, trigger) {
      const c = findContact(id); if (!c) return;
      c.history.unshift({ trigger, drafts, tone: null, used: false, ignored: true, ts: new Date().toISOString() });
      c.ignoreCount = (c.ignoreCount || 0) + 1;
      if (c.ignoreCount >= (store.settings.ignoreLimit || 3)) c.archived = true;
    }
    function interactMoment(id, type) {
      const c = findContact(id); if (!c) return;
      c.lastContact = new Date().toISOString(); c.ignoreCount = 0; c.archived = false;
      c.history.unshift({ trigger: type === "like" ? "点赞动态" : "回复动态", drafts: null, tone: null, used: true, ignored: false, ts: new Date().toISOString() });
    }
    function clearAllData() {
      store.contacts = buildSeed();
      store.settings = Object.assign({}, DEFAULT_SETTINGS, { onboarded: true });
    }

    /* ========== Utils · 温度算法 + 文案模板 ========== */
    function daysSince(date) { return Math.floor((Date.now() - new Date(date).getTime()) / 86400000); }
    function temperature(level, lastContact) {
      const t = store.settings.thresholds[level] || store.settings.thresholds.casual;
      const days = daysSince(lastContact);
      if (days <= t.warm) return Math.max(60, 100 - (days / t.warm) * 40);
      if (days >= t.frozen) return Math.max(0, 20 - (days - t.frozen) / 10);
      return 60 - ((days - t.warm) / (t.frozen - t.warm)) * 40;
    }
    function statusOf(temp) {
      if (temp >= 60) return "warm";
      if (temp >= 25) return "cool";
      return "frozen";
    }
    const STATUS_LABEL = { warm: "温热", cool: "常温", frozen: "结冰" };
    const LEVEL_LABEL  = { senior: "前辈", bestie: "死党", casual: "泛交" };

    function generateDrafts({ name, level, memory, trigger }) {
      const m = memory || "之前的事";
      const t = trigger || "想起了你";
      const T = {
        senior: {
          respect: `${name}好，刚看到${t}，让我想起当年${m}的时候。不用专门回我，看到就好~`,
          neutral: `${name}！${t}让我突然想起你，还记得${m}吗？最近怎么样，有空再聊。`,
          casual:  `哈喽${name}，${t}你看了吗？瞬间想起${m}哈哈，有空唠两句。`,
        },
        bestie: {
          respect: `诶${name}，${t}让我想起${m}那段日子，挺感慨的。回不回都行~`,
          neutral: `${name}！${t}是不是又戳中你了哈哈，记得${m}吗？冒个泡。`,
          casual:  `${name}！！${t}有没有！${m}那时候我俩也是绝了哈哈，唠会儿不？`,
        },
        casual: {
          respect: `${name}你好，看到${t}，想起之前${m}，问候一下。看到不用回。`,
          neutral: `${name}，${t}让我想到你，记得${m}，最近还好吗？随便聊聊。`,
          casual:  `Hi ${name}，${t}让我想起${m}哈哈，最近咋样？看到再说。`,
        },
      };
      return T[level] || T.casual;
    }

    /* ========== Toast ========== */
    const toastMsg = ref("");
    let toastTimer;
    function toast(msg) {
      toastMsg.value = msg;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastMsg.value = "", 2000);
    }

    /* ========== 页面：首页 ========== */
    const Home = {
      template: `
        <div class="col" style="gap:16px">
          <div class="box" style="text-align:center; padding:36px 16px">
            <div class="muted" style="letter-spacing:2px">[ LOGO 占位 ]</div>
            <h1 style="font-size:26px; margin:14px 0 6px">社交回声 Social Echo</h1>
            <div class="muted">终结"改天请你吃饭"——你的私人社交助理</div>
            <div class="row" style="justify-content:center; margin-top:18px">
              <router-link to="/echo" class="btn-primary" style="padding:8px 16px; border-radius:3px">进入主产品 →</router-link>
              <router-link to="/social" class="btn" style="padding:8px 16px; border-radius:3px; border:1px solid #c8c8c8">查看模拟朋友圈</router-link>
            </div>
          </div>
          <div class="section-title">— 核心功能 —</div>
          <div class="grid">
            <div v-for="f in features" :key="f.title" class="box box-dashed">
              <div class="muted" style="font-size:11px">[ {{ f.tag }} ]</div>
              <div style="font-weight:600; margin:6px 0 4px">{{ f.title }}</div>
              <div class="muted">{{ f.desc }}</div>
            </div>
          </div>
        </div>`,
      setup() {
        const features = [
          { tag: "MODULE 01", title: "结冰预警", desc: "重要联系人超期未联系，头像视觉化结冰" },
          { tag: "MODULE 02", title: "破冰投喂", desc: "基于动态/天气/资讯，生成三种语气文案" },
          { tag: "MODULE 03", title: "体面放弃", desc: "连续 N 次忽略 → 自然沉淀，消除负罪感" },
        ];
        return { features };
      }
    };

    /* ========== 页面：引导 Onboarding ========== */
    const Onboarding = {
      template: `
        <div style="max-width:540px; margin:30px auto">
          <div class="box" style="padding:24px">
            <div class="row" style="gap:4px; margin-bottom:20px">
              <div v-for="i in 3" :key="i" class="bar" style="flex:1">
                <div class="bar-fill" :class="step >= i ? 'warm' : ''" :style="{ width: step >= i ? '100%' : '0%' }"></div>
              </div>
            </div>
            <div v-if="step === 1">
              <div class="muted" style="letter-spacing:2px">[ STEP 1/3 ]</div>
              <h2 style="margin:8px 0 12px">先聊聊你的"通讯录"</h2>
              <p style="color:#555; line-height:1.8">
                你的微信里，是不是也躺着一些<b>熟悉又陌生</b>的名字？<br>
                曾经一起熬夜写代码、行业活动相谈甚欢，但对话框停在了半年前。<br><br>
                社交回声不替你寒暄，只在<b>合适的时机</b>给你一个<b>顺手</b>的开口理由。
              </p>
              <div class="placeholder" style="margin-top:14px">[ 插画占位 · 通讯录沉睡示意图 ]</div>
            </div>
            <div v-else-if="step === 2">
              <div class="muted" style="letter-spacing:2px">[ STEP 2/3 ]</div>
              <h2 style="margin:8px 0 12px">三件事，社交回声只做这三件</h2>
              <div class="col" style="gap:10px; margin-top:14px">
                <div class="box box-dashed"><b>① 结冰预警</b><div class="muted" style="margin-top:4px">超期未联系 → 头像视觉化结冰</div></div>
                <div class="box box-dashed"><b>② 破冰投喂</b><div class="muted" style="margin-top:4px">尊敬/平和/随意三种语气可选</div></div>
                <div class="box box-dashed"><b>③ 体面放弃</b><div class="muted" style="margin-top:4px">连续 3 次忽略 → 自然沉淀</div></div>
              </div>
            </div>
            <div v-else>
              <div class="muted" style="letter-spacing:2px">[ STEP 3/3 ]</div>
              <h2 style="margin:8px 0 12px">隐私承诺</h2>
              <ul style="color:#555; line-height:1.9; padding-left:20px">
                <li>所有联系人 / 记忆锚点 <b>仅存于本机</b></li>
                <li>不读取、不上传你的真实通讯录</li>
                <li>仅在你主动点击「生成文案」时调用 AI</li>
                <li>随时可在设置中清除全部数据</li>
              </ul>
              <div class="box box-dashed" style="margin-top:14px">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer">
                  <input type="checkbox" v-model="agree" style="width:auto" />
                  我已阅读并同意上述隐私承诺
                </label>
              </div>
            </div>
            <div class="row" style="justify-content:space-between; margin-top:20px">
              <button v-if="step > 1" class="btn" @click="step--">← 上一步</button>
              <span v-else class="muted" style="cursor:pointer" @click="finish">跳过引导 →</span>
              <button v-if="step < 3" class="btn-primary" @click="step++">下一步</button>
              <button v-else class="btn-primary" :disabled="!agree" @click="finish">开始使用</button>
            </div>
          </div>
        </div>`,
      setup() {
        const step = ref(1), agree = ref(false);
        const router = useRouter();
        function finish() { store.settings.onboarded = true; router.replace("/echo"); }
        return { step, agree, finish };
      }
    };

    /* ========== 页面：卡片墙 Echo ========== */
    const Echo = {
      template: `
        <div class="col" style="gap:14px">
          <div class="row" style="justify-content:space-between">
            <div><h2 class="title">我的回声</h2><div class="muted">温度从低到高排序，结冰联系人优先</div></div>
            <button class="btn-primary" @click="showAdd = true">+ 添加</button>
          </div>
          <div class="row" style="gap:14px; font-size:12px">
            <span class="tag tag-warm">温热 {{ stat.warm }}</span>
            <span class="tag tag-cool">常温 {{ stat.cool }}</span>
            <span class="tag tag-frozen">结冰 {{ stat.frozen }}</span>
            <span class="muted">沉淀 {{ stat.archived }}</span>
          </div>
          <div class="grid">
            <router-link v-for="c in activeList" :key="c.id" :to="'/echo/contact/' + c.id" class="box" style="display:block">
              <div class="row" style="justify-content:space-between">
                <div class="row">
                  <div class="avatar" :class="{ frozen: c.status === 'frozen' }">{{ c.avatar }}</div>
                  <div>
                    <div style="font-weight:600">{{ c.name }}</div>
                    <div class="muted">{{ levelLabel(c.level) }} · {{ c.days }}天前</div>
                  </div>
                </div>
                <span class="tag" :class="'tag-' + c.status">{{ statusLabel(c.status) }}</span>
              </div>
              <div class="muted" style="margin-top:8px; min-height:32px">{{ c.memory || '[ 未填写记忆锚点 ]' }}</div>
              <div class="row" style="margin-top:8px; gap:8px">
                <div class="bar" style="flex:1"><div class="bar-fill" :class="c.status" :style="{ width: c.temp + '%' }"></div></div>
                <span class="muted">{{ Math.round(c.temp) }}°</span>
              </div>
            </router-link>
          </div>
          <details v-if="archivedList.length > 0" class="box box-dashed">
            <summary class="muted" style="cursor:pointer">[ 沉淀区 · {{ archivedList.length }} 人，连续被忽略后自然降温 ]</summary>
            <div class="grid" style="margin-top:10px">
              <router-link v-for="c in archivedList" :key="c.id" :to="'/echo/contact/' + c.id" class="box" style="display:block; opacity:0.55; border-style:dashed">
                <div class="row">

              </router-link>
              <router-link to="/social" :class="{ active: $route.path === '/social' }">朋友圈</router-link>
              <router-link to="/report" :class="{ active: $route.path === '/report' }">报告</router-link>
              <router-link to="/settings" :class="{ active: $route.path === '/settings' }">设置</router-link>
            </div>
          </nav>
          <router-view />
          <div class="muted" style="text-align:center; margin-top:24px; padding-top:14px; border-top:1px dashed #ddd">
            Social Echo · 单 HTML 中保真原型 · 数据存于浏览器 localStorage
          </div>
          <div v-if="toastMsg" class="toast">{{ toastMsg }}</div>
        </div>`,
      setup() {
        const frozenCount = computed(() =>
          store.contacts.filter(c => !c.archived)
            .filter(c => statusOf(temperature(c.level, c.lastContact)) === "frozen").length
        );
        return { frozenCount, toastMsg };
      }
    };

    /* ========== Router ========== */
    const router = createRouter({
      history: createWebHashHistory(),
      routes: [
        { path: "/",                   component: Home },
        { path: "/onboard",            component: Onboarding },
        { path: "/echo",               component: Echo },
        { path: "/echo/contact/:id",   component: ContactDetail, props: true },
        { path: "/notifications",      component: Notifications },
        { path: "/social",             component: Social },
        { path: "/report",             component: Report },
        { path: "/settings",           component: Settings },
      ],
    });
    router.beforeEach((to, _from, next) => {
      if (!store.settings.onboarded && to.path !== "/onboard") return next("/onboard");
      next();
    });

    /* ========== Mount ========== */
    createApp(App).use(router).mount("#app");
  })();
  </script>
</body>
</html>
